name: CI - Frontend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-project:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Instalar Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Build
        run: npm run build

      - name: Rodar app
        run: npm start &

      - name: Esperar app
        run: npx wait-on http://localhost:3000
